<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MDP Archive</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Helvetica,Arial,sans-serif;
background:white;
}

#grid{
position:fixed;
inset:0;

background-image:
linear-gradient(#f3f3f3 1px, transparent 1px),
linear-gradient(90deg,#f3f3f3 1px, transparent 1px);

background-size:60px 60px;
}

#canvas{
position:absolute;
width:10000px;
height:10000px;
left:-5000px;
top:-5000px;
}

.photo{
position:absolute;
width:100px;
height:100px;
overflow:hidden;
cursor:pointer;
background:rgba(255,255,255,0.95);
border:2px solid rgba(0,0,0,.08);
box-shadow:0 6px 20px rgba(0,0,0,.08);
opacity:0;
transition:opacity .35s ease, transform .35s ease, box-shadow .35s ease;
}

.photo.visible{
opacity:1;
}

.photo.recent{
box-shadow:0 0 0 3px rgba(255,160,0,.9),0 12px 30px rgba(0,0,0,.15);
}

.photo img{
display:block;
width:100%;
height:100%;
object-fit:cover;
object-position:center;
pointer-events:none;
background:#f8f8f8;
}

.photo:hover{
z-index:100;
box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.meta{
position:absolute;
bottom:-22px;
left:0;
font-size:11px;
opacity:0;
transition:.3s;
white-space:nowrap;
}

.photo:hover .meta{
opacity:1;
}

header{
position:fixed;
top:30px;
left:30px;
z-index:999;
}

h1{
font-size:18px;
font-weight:500;
margin-bottom:8px;
}

p{
font-size:13px;
color:#666;
line-height:1.4;
}

button{
margin-top:15px;
border:none;
background:black;
color:white;
padding:10px 14px;
cursor:pointer;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.progressWrap{
display:none;
margin-bottom:15px;
}

.progressBar{
width:100%;
height:8px;
background:#f3f3f3;
border-radius:999px;
overflow:hidden;
}

.progressBar > div{
height:100%;
width:0%;
background:black;
transition:width .2s ease;
}

.progressText{
font-size:12px;
color:#666;
margin-top:8px;
}

.deleteBtn{
position:absolute;
top:8px;
right:8px;
width:24px;
height:24px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.55);
color:white;
font-size:16px;
line-height:24px;
cursor:pointer;
opacity:0;
transition:opacity .2s ease;
}

#deleteBtn{
margin-top:20px;
border:none;
background:#000;
color:#fff;
padding:10px 14px;
cursor:pointer;
display:none;
}

#viewer{
position:fixed;
inset:0;
background:rgba(255,255,255,.95);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

#viewerContent{
display:flex;
gap:50px;
max-width:1200px;
padding:40px;
}

#viewer img{
max-width:65vw;
max-height:80vh;
}

.info{
width:280px;
font-size:14px;
line-height:1.6;
}

.info h3{
font-weight:500;
margin-bottom:15px;
}

.download{
display:inline-block;
margin-top:20px;
}

#uploadModal{
display:none;
position:fixed;
inset:0;
background:rgba(255,255,255,.95);
z-index:1001;
justify-content:center;
align-items:center;
}

.modal{
width:500px;
padding:40px;
background:white;
border:1px solid #eee;
}

.modal h2{
margin-bottom:20px;
font-weight:500;
}

.modal select,
.modal textarea,
.modal input{
width:100%;
margin-bottom:15px;
padding:10px;
}

textarea{
height:120px;
resize:none;
}

.close{
position:absolute;
top:30px;
right:30px;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="grid"></div>

<header>
<h1>MDP Archive</h1>

<p>
Small memories.<br>
Work in progress.<br>
Everyday traces.
</p>

<button onclick="openUpload()">
Upload a Memory
</button>
</header>

<div id="canvas"></div>

<div id="viewer">

<div id="viewerContent">

<img id="viewerImage">

<div class="info">

<h3 id="viewerPrompt"></h3>

<p id="viewerDate"></p>

<br>

<p id="viewerNote"></p>

<a id="downloadBtn"
class="download"
download>
Download Original
</a>

<button id="deleteBtn">Delete</button>

</div>

</div>

</div>

<div id="uploadModal">

<div class="modal">

<h2>Upload a Memory</h2>

<input type="file" id="fileInput" multiple>

<select id="prompt">

<option>What is currently on your desk?</option>

<option>Show us where you work.</option>

<option>What are you making right now?</option>

<option>Share a moment from your daily MDP routine.</option>

<option>What is something you're working on that nobody has seen yet?</option>

<option>What object has quietly become part of your MDP experience?</option>

<option>Share a photo from your first weeks in MDP.</option>

<option>Share a photo from an MDP event (workshop, lecture, field trip, or exhibition).</option>

</select>

<textarea
id="note"
placeholder="Optional note"></textarea>

<div id="uploadProgress" class="progressWrap">
<div class="progressBar">
<div id="uploadProgressBar"></div>
</div>
<div id="uploadProgressText" class="progressText">Preparing your memory…</div>
</div>

<button onclick="uploadImage()">
Upload
</button>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const uploadModal=document.getElementById("uploadModal")
const viewer=document.getElementById("viewer")
const viewerImage=document.getElementById("viewerImage")
const viewerPrompt=document.getElementById("viewerPrompt")
const viewerDate=document.getElementById("viewerDate")
const viewerNote=document.getElementById("viewerNote")
const downloadBtn=document.getElementById("downloadBtn")

let photos=[]
let photoData=[]
let zoom=1
let zoomTarget=1
let panX=0
let panY=0
const storageKey="mdpPhotos"

// Supabase configuration: 替换为你的 Supabase 项目地址、匿名 key 和存储 bucket 名称
const SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co"
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY"
const SUPABASE_BUCKET = "memories"

const supabaseHeaders = {
  Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  apikey: SUPABASE_ANON_KEY
}

const supabaseConfigured = SUPABASE_URL.startsWith('https://') && !SUPABASE_URL.includes('YOUR_PROJECT_REF') && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY !== 'YOUR_ANON_KEY'

let currentUserId=localStorage.getItem("mdpCurrentUser")
if(!currentUserId){
  currentUserId="user-"+Math.random().toString(36).slice(2)
  localStorage.setItem("mdpCurrentUser", currentUserId)
}

function savePhotos(){
  localStorage.setItem(storageKey, JSON.stringify(photoData))
}

async function deletePhotoFromSupabase(path){
  if(!path) return
  const url = `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${encodeURIComponent(path)}`
  const res = await fetch(url, {
    method: 'DELETE',
    headers: supabaseHeaders
  })
  if(!res.ok){
    console.warn('Supabase delete failed', await res.text())
  }
}

function removePhoto(id){
  const index=photoData.findIndex(p=>p.id===id)
  if(index===-1) return
  const removed=photoData.splice(index,1)[0]
  savePhotos()
  if(removed.storagePath && removed.author===currentUserId){
    deletePhotoFromSupabase(removed.storagePath)
  }
  const photoObj=photos.find(p=>p.element.dataset.photoId===id)
  if(photoObj){
    photoObj.element.remove()
    photos=photos.filter(p=>p.element.dataset.photoId!==id)
  }
}

function createPhoto(item,centered=false,save=false){

const memory=typeof item==="object" && item.src ? {...item} : item

if(!memory.id){
  memory.id=`photo-${Date.now()}-${Math.random().toString(36).slice(2)}`
}

if(!memory.author){
  memory.author=currentUserId
}

if(!memory.date){
  memory.date=new Date().toLocaleDateString()
}

if(save){
  photoData.push(memory)
  savePhotos()
}

const div=document.createElement("div")
div.className="photo"
div.dataset.photoId=memory.id

const img=document.createElement("img")
img.src=memory.src

const meta=document.createElement("div")
meta.className="meta"
meta.innerText="Uploaded " + memory.date

div.appendChild(img)
div.appendChild(meta)

let x=0
let y=0

if(centered){
  try{
    const w = 100
    const h = 100
    const rect = canvas.getBoundingClientRect()
    const vx = window.innerWidth / 2
    const vy = window.innerHeight / 2
    const s = Math.max(0.1, zoom)
    x = (vx - rect.left) / s - w/2 + (Math.random() - 0.5) * 16
    y = (vy - rect.top) / s - h/2 + (Math.random() - 0.5) * 16
  }catch(e){
    x=5000-panX+(Math.random()-.5)*220
    y=5000-panY+(Math.random()-.5)*220
  }
}else{
  x=Math.random()*6000-3000
  y=Math.random()*6000-3000
}

div.style.left=x+"px"
div.style.top=y+"px"
div.style.zIndex=photos.length+1

const obj={
element:div,
x,
y,
vx:(Math.random()-.5)*0.04,
vy:(Math.random()-.5)*0.04,
phase:Math.random()*Math.PI*2,
rotation:(Math.random()-.5)*2,
paused:false
}

div.addEventListener("mouseenter",()=>{
  obj.paused=true
})

div.addEventListener("mouseleave",()=>{
  obj.paused=false
})

div.addEventListener("click",()=>{

viewer.style.display="flex"

viewerImage.src=memory.src

viewerPrompt.innerText=memory.prompt

viewerDate.innerText=memory.date

viewerNote.innerText=memory.note

downloadBtn.href=memory.src

const deleteBtn=document.getElementById("deleteBtn")
if(memory.author===currentUserId){
  deleteBtn.style.display="inline-block"
  deleteBtn.dataset.photoId=memory.id
}else{
  deleteBtn.style.display="none"
  deleteBtn.dataset.photoId=""
}

})

canvas.appendChild(div)

div.classList.add('visible')

if(centered){
  div.classList.add('recent')
  setTimeout(()=>div.classList.remove('recent'),1200)
  try{
    const rect = div.getBoundingClientRect()
    const cx = rect.left + rect.width/2
    const cy = rect.top + rect.height/2
    const dx = window.innerWidth/2 - cx
    const dy = window.innerHeight/2 - cy
    panX += dx
    panY += dy
    canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`
  }catch(e){
    console.error('center-pan failed', e)
  }
}

photos.push(obj)

}

async function loadSupabasePhotos(){
  if(!supabaseConfigured){
    console.warn('Supabase not configured; skipping cloud load')
    return
  }
  try{
    const listUrl = `${SUPABASE_URL}/storage/v1/object/list/${SUPABASE_BUCKET}?limit=200`
    const res = await fetch(listUrl, {
      headers: supabaseHeaders
    })
    if(!res.ok){
      throw new Error(await res.text())
    }
    const items = await res.json()
    for(const item of items){
      if(item.name.endsWith('/')) continue
      const storagePath = item.name
      if(photoData.some(p=>p.storagePath===storagePath)) continue
      const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${encodeURIComponent(storagePath)}`
      photoData.push({
        id:`sup-${storagePath}`,
        author:'cloud',
        date:new Date().toLocaleDateString(),
        src:publicUrl,
        prompt:'Uploaded memory',
        note:'Cloud preserved image.',
        storagePath
      })
    }
    savePhotos()
  }catch(e){
    console.warn('Failed to load Supabase photos', e)
  }
}

async function loadSavedPhotos(){
  const raw=localStorage.getItem(storageKey)
  if(raw){
    try{
      photoData=JSON.parse(raw)
    }catch(e){
      photoData=[]
    }
  }else{
    photoData=[
      {
        id:'seed-1',
        author:'seed',
        date:new Date().toLocaleDateString(),
        src:'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee',
        prompt:'Sample Memory',
        note:'First archive image.'
      },
      {
        id:'seed-2',
        author:'seed',
        date:new Date().toLocaleDateString(),
        src:'https://images.unsplash.com/photo-1497366754035-f200968a6e72',
        prompt:'Studio',
        note:'Work in progress.'
      }
    ]
    savePhotos()
  }
  await loadSupabasePhotos()
  photoData.forEach(item=>createPhoto(item))
}

function animate(time){

zoom += (zoomTarget - zoom) * 0.08
canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`
canvas.style.transformOrigin = 'center center'

photos.forEach(p=>{

if(!p.paused){

p.x+=p.vx
p.y+=p.vy

p.vx+=Math.sin(time*0.00035+p.phase)*0.00018
p.vy+=Math.cos(time*0.00028+p.phase)*0.00016

p.element.style.left=p.x+"px"
p.element.style.top=p.y+"px"
p.element.style.transform=`rotate(${p.rotation}deg)`

const rect = p.element.getBoundingClientRect()
if(rect.left < 0 && p.vx < 0) p.vx = -p.vx
if(rect.right > window.innerWidth && p.vx > 0) p.vx = -p.vx
if(rect.top < 0 && p.vy < 0) p.vy = -p.vy
if(rect.bottom > window.innerHeight && p.vy > 0) p.vy = -p.vy

}

})

requestAnimationFrame(animate)

}

animate()

let dragging=false

document.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",(e)=>{

if(!dragging)return

panX+=e.movementX
panY+=e.movementY

canvas.style.transform=`translate(${panX}px, ${panY}px) scale(${zoom})`

})

document.addEventListener("wheel",(e)=>{
	e.preventDefault()

const delta = e.deltaY > 0 ? -0.08 : 0.08
zoomTarget = Math.max(0.7, Math.min(2.2, zoomTarget + delta))

}, { passive:false })

viewer.addEventListener("click", e => {
  if(e.target===viewer){
    viewer.style.display="none"
  }
})

document.getElementById("deleteBtn").addEventListener("click", e => {
  e.stopPropagation()
  const id=e.target.dataset.photoId
  if(id){
    removePhoto(id)
    viewer.style.display="none"
  }
})

function openUpload(){
uploadModal.style.display="flex"
}

uploadModal.onclick=(e)=>{

if(e.target===uploadModal){

uploadModal.style.display="none"

}

}

function readFileDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader()
    reader.onload=()=>resolve(reader.result)
    reader.onerror=()=>reject(new Error('File read failed'))
    reader.readAsDataURL(file)
  })
}

async function uploadFileToSupabase(file){
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_')
  const path = `memories/${Date.now()}_${Math.random().toString(36).slice(2)}_${safeName}`
  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${encodeURIComponent(path)}`
  const res = await fetch(uploadUrl, {
    method: 'POST',
    headers: supabaseHeaders,
    body: file
  })
  if(!res.ok){
    throw new Error(await res.text())
  }
  const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${encodeURIComponent(path)}`
  return { publicUrl, storagePath: path }
}

async function uploadImage(){

const files = Array.from(document.getElementById("fileInput").files)

if(!files.length) return

const uploadButton = document.querySelector("#uploadModal button")
const progressWrap = document.getElementById("uploadProgress")
const progressBar = document.getElementById("uploadProgressBar")
const progressText = document.getElementById("uploadProgressText")

if(!supabaseConfigured){
  progressWrap.style.display = "block"
  progressBar.style.width = "0%"
  progressText.textContent = 'Supabase 未配置，无法上传。请替换 SUPABASE_URL 和 SUPABASE_ANON_KEY。'
  uploadButton.disabled = false
  return
}

uploadButton.disabled = true
progressWrap.style.display = "block"
progressBar.style.width = "0%"
progressText.textContent = files.length > 1 ? "Preparing your memories…" : "Preparing your memory…"

let progress = 0
const total = files.length
let uploaded = 0
const interval = setInterval(() => {
  progress = Math.min(progress + Math.random() * 22 + 8, 90)
  progressBar.style.width = progress + "%"
  progressText.textContent = total > 1 ? `Uploading ${Math.min(uploaded + 1, total)}/${total} memories…` : "Uploading your memory…"
}, 160)

try {
  for (const [index, file] of files.entries()) {
    const uploadResult = await uploadFileToSupabase(file)
    uploaded = index + 1
    progressBar.style.width = `${Math.round(84 * uploaded / total)}%`
    progressText.textContent = total > 1 ? `Uploading ${uploaded}/${total} memories…` : "Uploading your memory…"
    createPhoto({
      src: uploadResult.publicUrl,
      prompt: document.getElementById("prompt").value,
      note: document.getElementById("note").value,
      storagePath: uploadResult.storagePath
    }, true, true)
  }
  clearInterval(interval)
  progressBar.style.width = "100%"
  progressText.textContent = total > 1 ? "Done! Memories placed." : "Done! Placing your memory…"
  setTimeout(() => {
    uploadModal.style.display = "none"
    progressWrap.style.display = "none"
    uploadButton.disabled = false
    document.getElementById("fileInput").value = ""
  }, 280)
} catch (err) {
  clearInterval(interval)
  console.error('upload error', err)
  progressText.textContent = 'Upload error. 请检查 Supabase 配置或网络。'
  progressWrap.style.display = "none"
  uploadButton.disabled = false
}

}

loadSavedPhotos()

</script>

</body>
</html>
